 to complement insurance, not replace it, and we route unhedgeable risks to insurance recommendations."},{q:"Is this gambling?",a:"The same contract can be a gamble or a hedge \u2014 the difference is whether you hold the underlying risk. A hotelier buying a hurricane contract on their own coastline is transferring a risk they already have, which is the textbook definition of hedging. We only suggest positions against risks our analysis finds in your business, and we cap suggested sizing against your modeled exposure."},{q:"What if there\u2019s no market for my risk?",a:'Then we tell you. Every risk gets a basis grade, and "None" means no liquid contract has a real causal link to your loss. Those risks route to non-market recommendations: insurance quotes, operational controls, or cash reserves. In our demo report, one of six risks is unhedgeable \u2014 that\u2019s typical.'},{q:"Where do the hedges actually execute?",a:"On regulated venues \u2014 Kalshi, Polymarket US, and Coinbase. Ballast analyzes, sizes, and routes; the contracts, custody, and settlement live with the venue. You connect your own accounts and approve every order."},{q:"Can I lose money?",a:"Yes. If the event doesn\u2019t happen, the contract expires worthless and you lose the premium \u2014 like an insurance premium you paid for a year with no claim. Every position we show includes the maximum loss alongside the maximum payout. Never hedge with money you need for operations."},{q:"How much does Ballast cost?",a:"The risk scan and report are free. If you execute hedges through Ballast, we charge a flat routing fee shown on every order before you confirm \u2014 no percentage of payout, no hidden spread."}],ba=[{id:"profile",layer:null,color:"#4a6a8a",title:"Profiling your business",sub:"Industry, location, seasonality, customer mix, revenue drivers",findings:["Independent hotel \xB7 220 rooms \xB7 East Rutherford, NJ","Adjacent to MetLife Stadium \u2014 event-driven demand mix","~$14M annual revenu
